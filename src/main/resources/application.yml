server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  # undertow 配置
  undertow:
    # HTTP post内容的最大大小。当值为-1时，默认值为大小是无限的
    max-http-post-size: 1GB
    # 以下的配置会影响buffer,这些buffer会用于服务器连接的IO操作,有点类似netty的池化内存管理
    # 每块buffer的空间大小,越小的空间被利用越充分
    buffer-size: 512
    # 是否分配的直接内存
    direct-buffers: true
    threads:
      # 设置IO线程数, 它主要执行非阻塞的任务,它们会负责多个连接, 默认设置每个CPU核心一个线程
      io: 8
      # 阻塞任务线程池, 当执行类似servlet请求阻塞操作, undertow会从这个线程池中取得线程,它的值设置取决于系统的负载
      worker: 256

# Spring配置
spring:
  application:
    name: JustRAG
    version: @project.version@
  profiles:
    active: @profiles.active@
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeEmbeddingAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeImageAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeRerankAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAgentAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioSpeechAutoConfiguration
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeAudioTranscriptionAutoConfiguration

# Sa-Token配置
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: Authorization
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 604800
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid

# 日志配置
logging:
  level:
    com.shujichen: @logging.level@
    org.springframework: warn
    org.mybatis.spring.mapper: error
    org.apache.fury: warn
    org.springframework.ai.chat.client.advisor: info

# MyBatisPlus配置
mybatis-plus:
  mapper-locations: classpath:/mapper/*Mapper.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.neat.rag
  global-config:
    # 数据库相关配置
    db-config:
      #主键类型 AUTO:"自增",NONE:"空",INPUT:"用户输入",ASSIGN_ID:"雪花",ASSIGN_UUID:"唯一 UUID"
      id-type: ASSIGN_ID
      #字段策略 IGNORED:"忽略判断",NOT_NULL:"非 NULL 判断"),NOT_EMPTY:"非空判断"
      field-strategy: not_empty
      #驼峰下划线转换
      column-underline: true
      db-type: mysql
    #刷新mapper 调试神器
    refresh: true
  # 原生配置
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 向量库配置
vector-store:
  # 切换向量库时只需修改此值，系统会自动使用对应类型的配置
  # 向量存储类型 可选(milvus/postgresql/elasticsearch)
  type: milvus
  # Embedding API 单次批量大小，可根据提供商调整此值
  embedding-batch-size: 8
  # Milvus配置
  # 适用场景：大规模向量检索（百万级以上），性能优秀
  milvus:
    host: localhost
    port: 19530
    # 注意：自定义名称需要提前创建数据库，否则会自动使用 default
    database-name: default
    username:
    password:
  # PostgreSQL配置
  # 适用场景：中小规模向量检索（十万级）
  # 前置要求：PostgreSQL 必须安装 pgvector 扩展
  # 安装命令：CREATE EXTENSION vector;
  postgresql:
    host: localhost
    port: 5432
    database: just_rag
    username: postgres
    password: postgres
    # 建议：开发环境用 public，生产环境可创建独立 schema 隔离
    schema: public
    # 向量表名称默认值，实际表名由系统动态生成，"kb_{uuid}"
    table: vector_store
    # 批量写入的最大文档数
    # 建议：100-1000 之间，根据实际内存调整
    max-document-size: 100
  # Elasticsearch配置
  # 适用场景：全文检索 + 向量检索混合场景，支持复杂的过滤和聚合
  # 前置要求：Elasticsearch 8.0+（支持 dense_vector 字段类型）
  elasticsearch:
    # Elasticsearch 集群地址（支持多个节点，逗号分隔）
    # 注意：必须包含协议（http:// 或 https://）
    hosts: http://localhost:9200
    # 索引名称默认值，实际索引由系统动态生成，"kb_{uuid}"
    index-name: vector_store
    username: elastic
    password: elastic
    # Elasticsearch API Key（与账号密码二选一）
    api-key:
    # 是否启用 SSL/TLS 加密
    ssl-enabled: false

mineru:
  server-url: https://mineru.net
  # MinerU 云端 API Token，用于访问 https://mineru.net API
  # 如果使用本地化部署，此配置项可留空
  token: xxx
